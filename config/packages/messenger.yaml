framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
            failed: 'doctrine://default?queue_name=failed'

        routing:
            'App\Message\SyncAddressMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'